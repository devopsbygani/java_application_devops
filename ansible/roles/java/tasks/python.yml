---
- name: Install Python3, pip3
  become: true
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - python3
    - python3-pip
    # - awscli

- name: Install boto3 via apt
  become: true
  apt:
    name: python3-boto3
    state: present
- name: Install dependencies for AWS CLI
  become: true
  apt:
    name:
      - unzip
      - curl
    state: present

- name: Download AWS CLI v2
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip

- name: Unzip AWS CLI
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp/
    remote_src: yes

- name: Install AWS CLI
  become: true
  command: /tmp/aws/install